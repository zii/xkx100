version: '3.8'

services:
  xkx100:
    image: ghcr.io/fluffos/fluffos:master
    container_name: xkx100
    working_dir: /mudlib
    restart: unless-stopped
    stop_grace_period: 2s
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        cp -a /d-source/. /mudlib/d/
        cp -a /kungfu-source/. /mudlib/kungfu/
        /fluffos/bin/driver /mudlib/config.ini &
        PID=$$!
        trap 'kill -TERM $$PID 2>/dev/null; sleep 2; kill -KILL $$PID 2>/dev/null; exit 0' TERM
        wait $$PID
    tmpfs:
      - /mudlib/d:rw,noexec,nosuid,size=64M
      - /mudlib/kungfu:rw,noexec,nosuid,size=16M
    volumes:
      - ./:/mudlib:rw
      - ./d:/d-source:ro
      - ./kungfu:/kungfu-source:ro
