version: '3.8'

services:
  xkx100:
    image: ghcr.io/fluffos/fluffos:master
    container_name: xkx100
    working_dir: /mudlib
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command:
      - cp -a /d-source/. /mudlib/d/ && exec /fluffos/bin/driver /mudlib/config.ini
    tmpfs:
      - /mudlib/d:rw,noexec,nosuid,size=64M
    volumes:
      - ./:/mudlib:rw
      - ./d:/d-source:ro
